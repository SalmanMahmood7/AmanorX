<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- AmanorX favicon: the wordmark's X on the brand navy, one stroke in
       white and one in brand green so the mark stays legible at 16px. -->
  <rect width="64" height="64" rx="12" fill="#0d1a2e" />
  <line x1="19" y1="19" x2="45" y2="45" stroke="#ffffff" stroke-width="9" stroke-linecap="round" />
  <line x1="45" y1="19" x2="19" y2="45" stroke="#17a873" stroke-width="9" stroke-linecap="round" />
</svg>
